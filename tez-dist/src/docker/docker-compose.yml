name: tez-cluster

services:
  zookeeper:
    image: zookeeper:3.8.4
    container_name: zookeeper
    hostname: zookeeper
    networks:
      - hadoop-network
    ports:
      - "2181:2181"
    environment:
      ZOO_MY_ID: 1
    volumes:
      - zookeeper_data:/data
      - zookeeper_datalog:/datalog
      - zookeeper_logs:/logs

  namenode:
    image: apache/hadoop:3.4.2-lean
    container_name: namenode
    hostname: namenode
    platform: linux/amd64
    networks:
      - hadoop-network
    ports:
      - "9870:9870"  # NameNode Web UI
      - "9000:9000"  # IPC
    volumes:
      - hadoop_data:/data  # Default persistence path
      - hadoop_logs:/opt/hadoop/logs
      - ./conf/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml
      - ./conf/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml
    healthcheck:
      test:
        - "CMD-SHELL"
        - >
          su -s /bin/bash hadoop -c
          '/opt/hadoop/bin/hdfs dfsadmin -safemode get |
          grep -q "Safe mode is OFF"'
      interval: 5s
      timeout: 5s
      retries: 5
    user: root
    command: >
      /bin/bash -c "
      chown -R hadoop:hadoop /data /opt/hadoop/logs;
      su -s /bin/bash hadoop -c '
        if [ ! -f /data/namenode/current/VERSION ]; then
          echo \"Formatting NameNode...\";
          /opt/hadoop/bin/hdfs namenode -format -force -nonInteractive;
        fi;
        /opt/hadoop/bin/hdfs namenode
      '"

  datanode:
    image: apache/hadoop:3.4.2-lean
    container_name: datanode
    hostname: datanode
    platform: linux/amd64
    depends_on:
      namenode:
        condition: service_healthy
    networks:
      - hadoop-network
    ports:
      - "9864:9864"  # DataNode Web UI
      - "9866:9866"  # DataNode
    volumes:
      - hadoop_data:/data  # Default persistence path
      - hadoop_logs:/opt/hadoop/logs
      - ./conf/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml
      - ./conf/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml
    user: root
    command: >
      /bin/bash -c "
      chown -R hadoop:hadoop /data /opt/hadoop/logs;
      su -s /bin/bash hadoop -c '/opt/hadoop/bin/hdfs datanode'
      "

  tez-am:
    image: apache/tez:${TEZ_VERSION:-1.0.0-SNAPSHOT}
    container_name: tez-am
    hostname: tez-am
    networks:
      - hadoop-network
    ports:
      - "10001:10001"
      # - "5005:5005" # Uncomment for remote debugging
    env_file:
      - ./am.env
      # Already define TEZ_CUSTOM_CONF_DIR in the env file,
      # but adding here for clarity
      # environment:
      #   - TEZ_CUSTOM_CONF_DIR=/opt/tez/custom-conf
      # Uncomment the following lines if you want to mount a custom
      # tez-site.xml for the Tez AM
      # volumes:
      #   - ./custom-tez-site.xml:/opt/tez/custom-conf/tez-site.xml
      # Uncomment the following lines to mount custom plugins or JARs
      # required by Tez AM (e.g., UDFs, or dependencies previously managed
      # via YARN localization)
      #   - ./tez-plugins:/opt/tez/plugins
    depends_on:
      zookeeper:
        condition: service_started
      namenode:
        condition: service_healthy
      datanode:
        condition: service_started

  tez-child:
    image: apache/tez:${TEZ_VERSION:-1.0.0-SNAPSHOT}
    container_name: tez-child
    hostname: tez-child
    networks:
      - hadoop-network
    # ports:
    #   - "5006:5006"
    env_file:
      - ./child.env
    depends_on:
      tez-am:
        condition: service_started
    # Example command for a manual launch (requires valid AM connection info)
    command: ["tez-am", "10001", "container_12345", "token_abc", "1"]

networks:
  hadoop-network:
    name: hadoop-network
    driver: bridge

volumes:
  hadoop_data:
    name: hadoop_data
  hadoop_logs:
    name: hadoop_logs
  zookeeper_data:
    name: zookeeper_data
  zookeeper_datalog:
    name: zookeeper_datalog
  zookeeper_logs:
    name: zookeeper_logs
